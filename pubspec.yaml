name: tutorconnect_flutter
description: A new Flutter project for TutorConnect.
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  supabase_flutter: ^2.5.0
  intl: ^0.19.0
  lucide_icons: ^0.257.0
  provider: ^6.1.2
  google_fonts: ^6.2.1
  paynow: ^4.2.0
  url_launcher: ^6.3.2
  flutter_dotenv: ^6.0.1
  http: ^1.2.0
  image_picker: ^1.2.2
  file_picker: ^11.0.2
  connectivity_plus: ^7.1.1
  cached_network_image: ^3.4.1
  flutter_rating_bar: ^4.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - .env

  fonts:
    - family: Roboto
      fonts:
        - asset: assets/fonts/Roboto-Regular.ttf
        - asset: assets/fonts/Roboto-Bold.ttf
          weight: 700
